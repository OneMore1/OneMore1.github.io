# Site Settings
title                    : "Mo Wang | Computational Neuroscience"
description              : "fMRI foundation models · brain-computer interfaces · neuromodulation"
repository               : "OneMore1/OneMore1.github.io"
url                      : "https://onemore1.github.io"
baseurl                  : ""
google_scholar_stats_use_cdn : true

# google analytics
google_analytics_id      :  # 本地调试不填

# SEO Related（本地调试可留空）
google_site_verification :
bing_site_verification   :
baidu_site_verification  :

# Site Author
author:
  name             : "Mo Wang"
  avatar           :
  bio              : "PhD candidate · Warwick / SUSTech"
  role             : "Computational neuroscience and BCI researcher"
  affiliation      : "University of Warwick · Southern University of Science and Technology"
  location         : "Coventry / Shenzhen"
  employer         :
  pubmed           :
  googlescholar    :
  email            : "Mo.Wang.1@warwick.ac.uk"
  researchgate     :
  github           : "OneMore1"
  linkedin         :
  dblp             :
  orcid            :
  interests:
    - "fMRI foundation models"
    - "Neural decoding"
    - "Personalized brain parcellation"
    - "tES modeling and optimization"
  education_short:
    - "PhD, Computer Science, Warwick"
    - "MSc, Advanced Computer Science, Birmingham"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
